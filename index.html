<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mój Portal Ogłoszeniowy</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 20px; text-align: center; }
        .kontener { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, select, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #23e5db; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 6px; font-size: 16px; }
        button:disabled { background: #ccc; }
        .auth-sekcja { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid #eee; }
        .ogloszenie-karta { background: white; border: 1px solid #ddd; padding: 15px; margin-top: 15px; border-radius: 10px; text-align: left; }
        .ogloszenie-karta img { width: 100%; max-height: 400px; object-fit: cover; border-radius: 8px; }
        .cena { color: #23e5db; font-size: 1.4rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="kontener">
    <div class="auth-sekcja" id="auth-status">
        <h3>Logowanie / Rejestracja</h3>
        <input type="email" id="auth-email" placeholder="Email">
        <input type="password" id="auth-haslo" placeholder="Hasło">
        <button onclick="wykonajAuth()">Zaloguj / Stwórz konto</button>
    </div>

    <div id="form-dodawania" style="display: none;">
        <h2>Dodaj nowe ogłoszenie</h2>
        <form onsubmit="dodajOgloszenieDB(event)">
            <input type="text" id="t-tytul" placeholder="Tytuł ogłoszenia" required>
            
            <select id="t-kat" onchange="zmienPodkat()" required>
                <option value="">-- Wybierz kategorię --</option>
                <option value="Motoryzacja">Motoryzacja</option>
                <option value="Nieruchomości">Nieruchomości</option>
                <option value="Elektronika">Elektronika</option>
                <option value="Dom i Ogród">Dom i Ogród</option>
            </select>

            <select id="t-podkat" required>
                <option value="">-- Najpierw wybierz kategorię --</option>
            </select>

            <input type="number" id="t-cena" placeholder="Cena (zł)" min="1" required>
            <textarea id="t-opis" placeholder="Opis przedmiotu..." rows="4" required></textarea>
            <input type="text" id="t-lok" placeholder="Lokalizacja" required>
            <input type="tel" id="t-tel" placeholder="Numer telefonu" required>
            
            <label style="display:block; text-align:left; margin-top:10px;">Zdjęcie przedmiotu (wymagane):</label>
            <input type="file" id="t-plik" accept="image/*" required>

            <button type="submit" id="btn-wyslij">Opublikuj ogłoszenie</button>
        </form>
    </div>

    <hr>
    <h2>Najnowsze ogłoszenia</h2>
    <div id="lista-ogloszen">Ładowanie...</div>
</div>

<script src="script.js"></script>
</body>
</html>
