<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>KupSe - Twoja Tablica</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; text-align: center; }
        header { background: #002f34; padding: 20px; color: white; display: flex; justify-content: space-between; align-items: center; }
        .kat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; padding: 20px; }
        .kat-item { background: white; padding: 15px; border-radius: 8px; cursor: pointer; border: 1px solid #ddd; font-weight: bold; display: flex; flex-direction: column; align-items: center; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 100; }
        .form-box { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 400px; margin: auto; position: relative; top: 50%; transform: translateY(-50%); box-shadow: 0 4px 20px rgba(0,0,0,0.2); max-height: 90vh; overflow-y: auto; }
        input, textarea, select { width: 100%; margin: 8px 0; padding: 12px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #23e5db; border: none; padding: 12px 20px; cursor: pointer; font-weight: bold; border-radius: 6px; width: 100%; margin-top: 10px; }
        .btn-top { width: auto; background: #23e5db; color: #002f34; }
        #user-email { font-weight: bold; color: #23e5db; }
        .karta-zdjecie { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <header>
        <h1 style="color:#23e5db; margin:0; cursor:pointer;" onclick="location.reload()">KupSe</h1>
        <div id="auth-status">
            <button class="btn-top" onclick="document.getElementById('okno-auth').style.display='block'">Zaloguj / Zarejestruj</button>
        </div>
    </header>

    <div class="kat-grid">
        <div onclick="window.filtruj('Nieruchomości')" class="kat-item">🏠<span>Nieruchomości</span></div>
        <div onclick="window.filtruj('Motoryzacja')" class="kat-item">🚗<span>Motoryzacja</span></div>
        <div onclick="window.filtruj('Dom i Ogród')" class="kat-item">🛋️<span>Dom i Ogród</span></div>
        <div onclick="window.filtruj('Elektronika')" class="kat-item">📱<span>Elektronika</span></div>
        <div onclick="window.filtruj('Moda')" class="kat-item">👕<span>Moda</span></div>
        <div onclick="window.filtruj('Rolnictwo')" class="kat-item">🚜<span>Rolnictwo</span></div>
        <div onclick="window.filtruj('Sport i Hobby')" class="kat-item">⚽<span>Sport</span></div>
        <div onclick="window.filtruj('Oddam za darmo')" class="kat-item">♻️<span>Za darmo</span></div>
    </div>

    <button style="width: auto; font-size: 1.2rem; padding: 15px 30px;" onclick="document.getElementById('okno-dodaj').style.display='block'">+ Dodaj Ogłoszenie</button>

    <div id="lista-ogloszen" style="max-width:800px; margin: 30px auto; padding: 0 20px;"></div>

    <div id="okno-auth" class="overlay">
        <div class="form-box">
            <h3>Twoje Konto</h3>
            <input type="email" id="auth-email" placeholder="Email">
            <input type="password" id="auth-haslo" placeholder="Hasło">
            <button onclick="window.wykonajAuth()">Zatwierdź</button>
            <button onclick="this.parentElement.parentElement.style.display='none'" style="background:none; color:red;">Zamknij</button>
        </div>
    </div>

    <div id="okno-dodaj" class="overlay">
        <div class="form-box">
            <h3>Dodaj Nowe Ogłoszenie</h3>
            <input type="text" id="t-tytul" placeholder="Tytuł">
            <select id="t-kat" onchange="window.zmienPodkat()">
                <option value="">Wybierz kategorię</option>
                <option value="Nieruchomości">Nieruchomości</option>
                <option value="Motoryzacja">Motoryzacja</option>
                <option value="Dom i Ogród">Dom i Ogród</option>
                <option value="Elektronika">Elektronika</option>
                <option value="Moda">Moda</option>
                <option value="Rolnictwo">Rolnictwo</option>
                <option value="Sport i Hobby">Sport i Hobby</option>
                <option value="Oddam za darmo">Oddam za darmo</option>
            </select>
            <select id="t-podkat"><option value="">Wybierz podkategorię</option></select>
            <input type="number" id="t-cena" placeholder="Cena">
            <input type="text" id="t-tel" placeholder="Numer telefonu">
            <input type="text" id="t-foto" placeholder="Link do zdjęcia (np. z imgur)">
            <textarea id="t-opis" placeholder="Opis ogłoszenia"></textarea>
            <input type="text" id="t-lok" placeholder="Miasto">
            <button onclick="window.dodajOgloszenieDB(event)">Opublikuj</button>
            <button onclick="this.parentElement.parentElement.style.display='none'" style="background:none; color:gray;">Anuluj</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
