<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>KupSe - Serwis Ogłoszeniowy</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f4f4; }
        header { background: #002f34; padding: 20px; color: white; display: flex; justify-content: space-between; }
        .container { max-width: 800px; margin: auto; padding: 20px; text-align: center; }
        .form-box { display: none; background: white; padding: 20px; border: 1px solid #ccc; margin-top: 20px; border-radius: 8px; }
        input { width: 80%; padding: 10px; margin: 5px; }
        button { padding: 10px 20px; cursor: pointer; background: #23e5db; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <h1>KupSe</h1>
        <div id="auth-status">
            <button onclick="window.pokazAuth()">Zaloguj / Zarejestruj</button>
        </div>
    </header>

    <div class="container">
        <div id="kategorie-kontener"></div> <button onclick="window.sprawdzDostep()">+ Dodaj Ogłoszenie</button>

        <div id="sekcja-auth" class="form-box">
            <h2 id="auth-tytul">Logowanie</h2>
            <input type="email" id="auth-email" placeholder="E-mail">
            <input type="password" id="auth-haslo" placeholder="Hasło">
            <button onclick="window.wykonajAuth()">Zatwierdź</button>
            <p onclick="window.przepnijTryb()" style="cursor:pointer; text-decoration: underline;">Zmień tryb</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
