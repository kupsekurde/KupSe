<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KupSe.pl</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header style="background:#002f34; padding:20px; color:white; display:flex; justify-content:space-between; align-items:center;">
        <h1 style="margin:0; color:#23e5db;">KupSe</h1>
        <div id="auth-status">
            <button onclick="otworzAuth()">Zaloguj / Zarejestruj</button>
        </div>
    </header>

    <div class="container" style="max-width:1000px; margin:auto; padding:20px;">
        <div id="debug-info" style="color:red; font-weight:bold;"></div>

        <nav id="kategorie"></nav>

        <div style="text-align: center; margin: 20px;">
            <button onclick="sprawdzDostepDoDodawania()" style="padding:15px 30px; background:#23e5db; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">+ Dodaj Ogłoszenie</button>
        </div>

        <div id="sekcja-auth" style="display:none; background:#eee; padding:20px; border-radius:10px; margin:20px 0;">
            <h2 id="auth-tytul">Logowanie</h2>
            <input type="email" id="auth-email" placeholder="E-mail" style="width:100%; padding:10px; margin:5px 0;">
            <input type="password" id="auth-haslo" placeholder="Hasło" style="width:100%; padding:10px; margin:5px 0;">
            <button onclick="obslugaAuth()" style="width:100%; padding:10px; background:#002f34; color:white; border:none; margin-top:10px;">Zatwierdź</button>
            <p onclick="przepnijAuth()" style="text-decoration:underline; cursor:pointer; text-align:center;">Zmień tryb (Logowanie/Rejestracja)</p>
            <button onclick="document.getElementById('sekcja-auth').style.display='none'" style="width:100%; padding:10px; background:gray; color:white; border:none;">Anuluj</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
