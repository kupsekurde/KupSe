<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KupSe - Gotowiec</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #23e5db; --bg: #f4f7f6; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        .header { background: white; padding: 10px 5%; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .logo { height: 50px; cursor: pointer; }
        .cat-scroll { display: flex; overflow-x: auto; gap: 15px; padding: 20px 5%; background: white; border-bottom: 1px solid #ddd; scrollbar-width: none; }
        .cat-card { min-width: 80px; text-align: center; cursor: pointer; }
        .cat-icon { width: 55px; height: 55px; background: #eee; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 26px; margin: 0 auto 5px; }
        .main-container { max-width: 1100px; margin: 20px auto; padding: 0 15px; }
        .ads-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        @media (min-width: 768px) { .ads-grid { grid-template-columns: repeat(4, 1fr); } }
        .ad-box { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); cursor: pointer; }
        .ad-img { width: 100%; height: 140px; object-fit: cover; background: #eee; }
        .ad-info { padding: 10px; }
        .ad-price { font-size: 18px; font-weight: 900; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; width: 90%; max-width: 500px; border-radius: 20px; padding: 20px; max-height: 90vh; overflow-y: auto; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-submit { background: var(--primary); border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .gallery-preview { display: flex; gap: 5px; overflow-x: auto; margin: 10px 0; }
        .gallery-preview img { height: 80px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="header">
    <img src="KupSe.jpg" class="logo" onclick="location.reload()">
    <div id="nav-auth">
        <button onclick="document.getElementById('modal-login').style.display='flex'">Zaloguj</button>
    </div>
</div>

<div class="cat-scroll" id="cat-list"></div>

<div class="main-container">
    <div class="ads-grid" id="ads-list"></div>
</div>

<div id="modal-login" class="modal">
    <div class="modal-content">
        <h3>Logowanie / Rejestracja</h3>
        <input type="email" id="log-email" placeholder="Email">
        <input type="password" id="log-pass" placeholder="Hasło">
        <button class="btn-submit" onclick="autoryzacja()">Wejdź</button>
        <button onclick="this.parentElement.parentElement.style.display='none'" style="background:none; border:none; width:100%; margin-top:10px; cursor:pointer">Anuluj</button>
    </div>
</div>

<div id="modal-add" class="modal">
    <div class="modal-content">
        <h3>Dodaj ogłoszenie</h3>
        <form id="add-form" onsubmit="dodajOgloszenie(event)">
            <input type="text" id="f-tytul" placeholder="Tytuł" required>
            <select id="f-kat" onchange="updateSub()"><option value="">Wybierz kategorię</option></select>
            <select id="f-podkat"><option value="">Wybierz podkategorię</option></select>
            <input type="number" id="f-cena" placeholder="Cena (zł)" required>
            <input type="text" id="f-lok" placeholder="Miasto" required>
            <textarea id="f-opis" placeholder="Opis..."></textarea>
            <input type="tel" id="f-tel" placeholder="Nr telefonu" required>
            <label style="font-size: 11px;">Wybierz do 5 zdjęć:</label>
            <input type="file" id="f-pliki" accept="image/*" multiple>
            <button type="submit" class="btn-submit" id="btn-pub">Opublikuj</button>
        </form>
    </div>
</div>

<div id="modal-view" class="modal">
    <div class="modal-content" id="view-data"></div>
</div>

<script src="script.js"></script>
</body>
</html>
