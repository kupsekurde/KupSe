<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>KupSe</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; text-align: center; }
        header { background: #002f34; padding: 20px; color: white; display: flex; justify-content: space-between; }
        .form-box { display: none; background: white; padding: 20px; border: 1px solid #ccc; margin: 20px auto; width: 300px; border-radius: 8px; }
        input, textarea { width: 90%; margin: 5px 0; padding: 8px; }
        button { background: #23e5db; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <h1 style="color:#23e5db">KupSe</h1>
        <button onclick="window.pokazAuth()">Zaloguj / Zarejestruj</button>
    </header>

    <button style="margin-top: 50px;" onclick="window.otworzDodawanie()">+ Dodaj Ogłoszenie</button>

    <div id="sekcja-auth" class="form-box">
        <input type="email" id="auth-email" placeholder="E-mail">
        <input type="password" id="auth-haslo" placeholder="Hasło">
        <button onclick="window.wykonajAuth()">Zarejestruj się</button>
    </div>

    <div id="okno-dodawania" class="form-box">
        <input type="text" id="t-tytul" placeholder="Tytuł">
        <input type="number" id="t-cena" placeholder="Cena">
        <textarea id="t-opis" placeholder="Opis"></textarea>
        <input type="text" id="t-lok" placeholder="Lokalizacja">
        <button onclick="window.dodajOgloszenieDB(event)">Opublikuj</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
