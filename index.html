<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KupSe.pl - Ogłoszenia</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header>
        <h1 onclick="location.reload()" style="cursor:pointer">KupSe</h1>
        <div id="auth-status">
            <button onclick="otworzAuth()">Zaloguj / Zarejestruj</button>
        </div>
    </header>

    <div class="container">
        <nav id="kategorie"></nav>

        <div style="text-align: center; margin: 20px;">
            <button onclick="sprawdzDostepDoDodawania()" style="padding:15px; background:#23e5db; font-weight:bold; border:none; border-radius:5px; cursor:pointer;">+ Dodaj Ogłoszenie</button>
        </div>

        <section id="sekcja-auth" style="display:none; background:white; padding:20px; border-radius:8px; border:2px solid #002f34; margin-bottom:20px;">
            <h2 id="auth-tytul">Logowanie</h2>
            <input type="email" id="auth-email" placeholder="E-mail" style="display:block; width:90%; margin:10px auto; padding:10px;">
            <input type="password" id="auth-haslo" placeholder="Hasło (min. 6 znaków)" style="display:block; width:90%; margin:10px auto; padding:10px;">
            <button onclick="obslugaAuth()" style="width:90%; padding:10px; background:#002f34; color:white; border:none; margin:10px;">Zatwierdź</button>
            <p onclick="przepnijAuth()" style="text-align:center; cursor:pointer; text-decoration:underline;">Zmień tryb (Logowanie/Rejestracja)</p>
            <button onclick="zamknijAuth()" style="width:90%; padding:10px; background:grey; color:white; border:none; margin:10px;">Anuluj</button>
        </section>

        <section id="sekcja-dodawania" style="display:none; background:white; padding:20px; border-radius:8px; border:2px solid #002f34;">
            <h2>Dodaj ogłoszenie</h2>
            <input type="text" id="f-tytul" placeholder="Tytuł" style="display:block; width:90%; margin:10px auto; padding:10px;">
            <textarea id="f-opis" placeholder="Opis" style="display:block; width:90%; margin:10px auto; padding:10px;"></textarea>
            <input type="number" id="f-cena" placeholder="Cena" style="display:block; width:90%; margin:10px auto; padding:10px;">
            <input type="text" id="f-lokalizacja" placeholder="Lokalizacja" style="display:block; width:90%; margin:10px auto; padding:10px;">
            <input type="tel" id="f-telefon" placeholder="Telefon (9 cyfr)" maxlength="9" style="display:block; width:90%; margin:10px auto; padding:10px;">
            
            <select id="f-kategoria" onchange="zaladujPodkategorieFormularza()" style="display:block; width:90%; margin:10px auto; padding:10px;">
                <option value="">Wybierz kategorię</option>
            </select>
            <select id="f-podkategoria" style="display:block; width:90%; margin:10px auto; padding:10px;">
                <option value="">Wybierz podkategorię</option>
            </select>

            <button onclick="alert('Zaraz dodamy funkcję wysyłki!')" style="width:90%; padding:15px; background:#002f34; color:white; border:none; margin:10px;">Opublikuj</button>
            <button onclick="zamknijDodawanie()" style="width:90%; padding:10px; background:grey; color:white; border:none; margin:10px;">Anuluj</button>
        </section>

        <main id="app">
            <div id="lista-ogloszen"></div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
